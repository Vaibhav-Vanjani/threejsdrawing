<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>2D to 3D Shape Editor</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  font-family:Arial;
  background:#f5f5f5;
}

.toolbar{
  position:absolute;
  top:20px;
  left:20px;
  z-index:100;
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border-radius:12px;
  background:rgba(0,0,0,0.75);
  flex-wrap:wrap;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
  background:#333;
}

button.active{
  background:#7c3aed;
}

label{
  color:white;
  font-size:14px;
}

input[type="range"]{
  width:100px;
}

</style>
</head>
<body>

<div class="toolbar">

  <button id="rectBtn">
    Rectangle
  </button>

  <button id="circleBtn">
    Circle
  </button>

  <input
    type="color"
    id="colorPicker"
    value="#7c3aed"
  >

  <label>Width</label>

  <input
    type="range"
    id="widthSlider"
    min="0.5"
    max="20"
    step="0.1"
    value="1"
  >

  <label>Height</label>

  <input
    type="range"
    id="heightSlider"
    min="0.5"
    max="20"
    step="0.1"
    value="1"
  >

  <label>Depth</label>

  <input
    type="range"
    id="depthSlider"
    min="0.2"
    max="10"
    step="0.1"
    value="1"
  >

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">

import * as THREE from 'three';

import { OrbitControls }
from 'three/addons/controls/OrbitControls.js';

//
// SCENE
//

const scene = new THREE.Scene();

scene.background =
  new THREE.Color(0xffffff);

//
// CAMERA
//

const aspect =
  window.innerWidth /
  window.innerHeight;

const size = 15;

const camera =
  new THREE.OrthographicCamera(
    -size * aspect,
    size * aspect,
    size,
    -size,
    0.1,
    1000
  );

camera.position.set(0,0,20);

camera.lookAt(0,0,0);

//
// RENDERER
//

const renderer =
  new THREE.WebGLRenderer({
    antialias:true
  });

renderer.setSize(
  window.innerWidth,
  window.innerHeight
);

document.body.appendChild(
  renderer.domElement
);

//
// CONTROLS
//

const controls =
  new OrbitControls(
    camera,
    renderer.domElement
  );

controls.enableDamping = true;

//
// LIGHTS
//

scene.add(
  new THREE.AmbientLight(
    0xffffff,
    2
  )
);

const light =
  new THREE.DirectionalLight(
    0xffffff,
    2
  );

light.position.set(10,10,10);

scene.add(light);

//
// UI
//

const rectBtn =
  document.getElementById('rectBtn');

const circleBtn =
  document.getElementById('circleBtn');

const colorPicker =
  document.getElementById('colorPicker');

const widthSlider =
  document.getElementById('widthSlider');

const heightSlider =
  document.getElementById('heightSlider');

const depthSlider =
  document.getElementById('depthSlider');

//
// STATES
//

let currentShape =
  'rectangle';

let drawMode = false;

let isDrawing = false;

let startPoint = null;

let previewMesh = null;

let selectedObject = null;

const objects = [];

//
// BUTTONS
//

rectBtn.onclick = ()=>{

  currentShape =
    'rectangle';

  drawMode = true;

  rectBtn.classList.add(
    'active'
  );

  circleBtn.classList.remove(
    'active'
  );

};

circleBtn.onclick = ()=>{

  currentShape =
    'circle';

  drawMode = true;

  circleBtn.classList.add(
    'active'
  );

  rectBtn.classList.remove(
    'active'
  );

};

//
// RAYCASTER
//

const raycaster =
  new THREE.Raycaster();

const mouse =
  new THREE.Vector2();

//
// DRAW PLANE
//

const drawPlane =
  new THREE.Mesh(

    new THREE.PlaneGeometry(
      1000,
      1000
    ),

    new THREE.MeshBasicMaterial({
      visible:false
    })

  );

scene.add(drawPlane);

function getWorldPoint(event){

  const rect =
    renderer.domElement
    .getBoundingClientRect();

  mouse.x =
    ((event.clientX - rect.left)
    / rect.width) * 2 - 1;

  mouse.y =
    -((event.clientY - rect.top)
    / rect.height) * 2 + 1;

  raycaster.setFromCamera(
    mouse,
    camera
  );

  const intersects =
    raycaster.intersectObject(
      drawPlane
    );

  if(intersects.length > 0){

    return intersects[0].point;

  }

  return null;
}

//
// MATERIAL
//

function createMaterial(){

  return new THREE.MeshStandardMaterial({

    color: colorPicker.value

  });

}

//
// BORDER
//

function addBorder(mesh){

  const edges =
    new THREE.EdgesGeometry(
      mesh.geometry
    );

  const border =
    new THREE.LineSegments(

      edges,

      new THREE.LineBasicMaterial({
        color:0x8B5E3C
      })

    );

  //
  // IGNORE BORDER IN SELECTION
  //

  border.raycast = ()=>{};

  mesh.add(border);

}

//
// DRAW
//

renderer.domElement.addEventListener(

  'pointerdown',

  (e)=>{

    if(!drawMode) return;

    const point =
      getWorldPoint(e);

    if(!point) return;

    isDrawing = true;

    controls.enabled = false;

    startPoint = point;

  }

);

renderer.domElement.addEventListener(

  'pointermove',

  (e)=>{

    if(!isDrawing) return;

    const currentPoint =
      getWorldPoint(e);

    if(!currentPoint) return;

    const width =
      Math.abs(
        currentPoint.x -
        startPoint.x
      );

    const height =
      Math.abs(
        currentPoint.y -
        startPoint.y
      );

    const depth =
      parseFloat(
        depthSlider.value
      );

    //
    // REMOVE OLD
    //

    if(previewMesh){

      scene.remove(
        previewMesh
      );

      previewMesh.geometry.dispose();

    }

    //
    // GEOMETRY
    //

    let geometry;

    if(currentShape === 'rectangle'){

      geometry =
        new THREE.BoxGeometry(
          width,
          height,
          depth
        );

    }else{

      const radius =
        Math.max(
          width,
          height
        ) / 2;

      geometry =
        new THREE.CylinderGeometry(
          radius,
          radius,
          depth,
          64
        );

      geometry.rotateX(
        Math.PI / 2
      );

    }

    //
    // CREATE MESH
    //

    previewMesh =
      new THREE.Mesh(
        geometry,
        createMaterial()
      );

    previewMesh.userData.shape =
      currentShape;

    previewMesh.userData.width =
      width;

    previewMesh.userData.height =
      height;

    previewMesh.userData.depth =
      depth;

    //
    // POSITION
    //

    previewMesh.position.x =
      (startPoint.x +
      currentPoint.x) / 2;

    previewMesh.position.y =
      (startPoint.y +
      currentPoint.y) / 2;

    previewMesh.position.z = 0;

    //
    // BORDER
    //

    addBorder(previewMesh);

    //
    // ADD
    //

    scene.add(previewMesh);

  }

);

renderer.domElement.addEventListener(

  'pointerup',

  ()=>{

    if(!isDrawing) return;

    isDrawing = false;

    drawMode = false;

    controls.enabled = true;

    rectBtn.classList.remove(
      'active'
    );

    circleBtn.classList.remove(
      'active'
    );

    objects.push(
      previewMesh
    );

    previewMesh = null;

  }

);

//
// SELECT OBJECT
//

renderer.domElement.addEventListener(

  'click',

  (e)=>{

    if(drawMode) return;

    const rect =
      renderer.domElement
      .getBoundingClientRect();

    mouse.x =
      ((e.clientX - rect.left)
      / rect.width) * 2 - 1;

    mouse.y =
      -((e.clientY - rect.top)
      / rect.height) * 2 + 1;

    raycaster.setFromCamera(
      mouse,
      camera
    );

    const intersects =
      raycaster
      .intersectObjects(
        objects,
        false
      )
      .filter(
        item =>
        item.object.type === 'Mesh'
      );

    //
    // RESET OLD
    //

    if(selectedObject){

      selectedObject.material.emissive.set(
        0x000000
      );

    }

    //
    // SELECT
    //

    if(intersects.length > 0){

      selectedObject =
        intersects[0].object;

      selectedObject.material.emissive.set(
        0x444444
      );

      //
      // UPDATE UI
      //

      widthSlider.value =
        selectedObject.userData.width;

      heightSlider.value =
        selectedObject.userData.height;

      depthSlider.value =
        selectedObject.userData.depth;

      colorPicker.value =
        "#" +
        selectedObject.material.color
        .getHexString();

    }else{

      selectedObject = null;

    }

  }

);

//
// UPDATE SHAPE
//

function updateSelectedShape(){

  if(!selectedObject) return;

  const width =
    parseFloat(
      widthSlider.value
    );

  const height =
    parseFloat(
      heightSlider.value
    );

  const depth =
    parseFloat(
      depthSlider.value
    );

  //
  // SAVE
  //

  selectedObject.userData.width =
    width;

  selectedObject.userData.height =
    height;

  selectedObject.userData.depth =
    depth;

  //
  // REMOVE OLD GEOMETRY
  //

  selectedObject.geometry.dispose();

  //
  // CREATE NEW GEOMETRY
  //

  let geometry;

  if(
    selectedObject.userData.shape
    === 'rectangle'
  ){

    geometry =
      new THREE.BoxGeometry(
        width,
        height,
        depth
      );

  }else{

    const radius =
      Math.max(
        width,
        height
      ) / 2;

    geometry =
      new THREE.CylinderGeometry(
        radius,
        radius,
        depth,
        64
      );

    geometry.rotateX(
      Math.PI / 2
    );

  }

  //
  // APPLY GEOMETRY
  //

  selectedObject.geometry =
    geometry;

  //
  // REMOVE OLD BORDERS
  //

  while(
    selectedObject.children.length
  ){

    selectedObject.remove(
      selectedObject.children[0]
    );

  }

  //
  // ADD NEW BORDER
  //

  addBorder(
    selectedObject
  );

  //
  // UPDATE COLOR
  //

  selectedObject.material.color.set(
    colorPicker.value
  );

}

//
// EVENTS
//

widthSlider.oninput =
  updateSelectedShape;

heightSlider.oninput =
  updateSelectedShape;

depthSlider.oninput =
  updateSelectedShape;

colorPicker.oninput =
  updateSelectedShape;

//
// RESIZE
//

window.addEventListener(

  'resize',

  ()=>{

    const aspect =
      window.innerWidth /
      window.innerHeight;

    camera.left =
      -size * aspect;

    camera.right =
      size * aspect;

    camera.top = size;

    camera.bottom = -size;

    camera.updateProjectionMatrix();

    renderer.setSize(
      window.innerWidth,
      window.innerHeight
    );

  }

);

//
// ANIMATE
//

function animate(){

  requestAnimationFrame(
    animate
  );

  controls.update();

  renderer.render(
    scene,
    camera
  );

}

animate();

</script>

</body>
</html>
